<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLLY P1LS | Underground Elite</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="spotlight"></div>

    <nav>
        <div class="logo">NOLLY P1LS</div>
        <div class="nav-info">MOSCOW • 2026</div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="tag">EST. 2026</div>
                <h1>NOLLY <span class="outline">P1LS</span></h1>
                <p>Эпицентр ночной эстетики. Только для своих.</p>
                <div class="scroll-hint">SCROLL TO EXPLORE</div>
            </div>
        </section>

        <section class="bento-grid">
            <!-- Главный ивент -->
            <div class="card tall main-event">
                <img src="img/party.jpg" class="bg-img" alt="Party">
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="date">NEXT SATURDAY</span>
                    <h2>NO LIMITS NIGHT</h2>
                    <button class="mini-btn">ENTRY INFO</button>
                </div>
            </div>

            <!-- Бар -->
            <div class="card wide">
                <img src="img/drinks.jpg" class="bg-img" alt="Bar">
                <div class="card-content">
                    <h2>LIQUID GOLD</h2>
                    <p>Авторская миксология от шеф-бармена.</p>
                </div>
            </div>

            <!-- VIP -->
            <div class="card">
                <img src="img/vip.jpg" class="bg-img" alt="VIP">
                <div class="card-content">
                    <h2>P1LS VIP</h2>
                    <span>PRIVATE ROOMS</span>
                </div>
            </div>

            <!-- Контакты/Локация -->
            <div class="card accent">
                <div class="card-content">
                    <h2>FOLLOW</h2>
                    <p>@NOLLYP1LS</p>
                    <div class="status-dot"><span></span> ONLINE NOW</div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
