<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOLLY | Zenith Control Pro</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Премиальный круглый шрифт Geologica (Google Fonts) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Иконки (Lucide) и Графики (Chart.js) -->
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- Блок бесконечной бегущей строки -->
    <div class="ticker-wrap">
        <div class="ticker" id="webticker">
            <!-- Контент генерируется автоматически в script.js -->
        </div>
    </div>

    <div class="app-container">
        <!-- Боковая панель (Sidebar) -->
        <aside class="sidebar">
            <div class="logo">NOLLY<span>.</span></div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-link active" onclick="navigation('dashboard', event)">
                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('analytics', event)">
                    <i data-lucide="bar-chart-big"></i> <span>Analytics</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('appearance', event)">
                    <i data-lucide="palette"></i> <span>Appearance</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('security', event)">
                    <i data-lucide="shield-check"></i> <span>Security</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="system-badge">
                    <div class="pulse"></div>
                    <span>ZENITH CORE V.3 ACTIVE</span>
                </div>
                <button class="btn-wallet" onclick="action('connect')">
                    <i data-lucide="wallet"></i> <span>Connect Wallet</span>
                </button>
            </div>
        </aside>

        <!-- Динамическая область контента -->
        <main class="main-content" id="router-view">
            <!-- Сюда JS подставит Dashboard или другие разделы -->
        </main>
    </div>

    <!-- Всплывающие уведомления (Toast) -->
    <div id="toast" class="toast">Система готова</div>

    <!-- Подключение скриптов -->
    <script src="script.js"></script>
</body>
</html>
