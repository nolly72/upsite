<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLLY | Zenith Control Pro</title>
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Премиальный круглый шрифт Geologica -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Иконки и Графики (CDN библиотеки) -->
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- Бегущая строка (Заполнится через JS: BTC, ETH, SOL, ADA, DOT и др.) -->
    <div class="ticker-wrap">
        <div class="ticker" id="webticker">
            <!-- Контент генерируется в script.js -->
        </div>
    </div>

    <div class="app-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="logo">NOLLY<span>.</span></div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-link active" onclick="navigation('dashboard', event)">
                    <i data-lucide="layout-dashboard"></i> <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('analytics', event)">
                    <i data-lucide="bar-chart-big"></i> <span>Analytics</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('appearance', event)">
                    <i data-lucide="palette"></i> <span>Appearance</span>
                </a>
                <a href="#" class="nav-link" onclick="navigation('security', event)">
                    <i data-lucide="shield-check"></i> <span>Security</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="system-badge">
                    <div class="pulse"></div>
                    <span>ZENITH CORE ACTIVE</span>
                </div>
                <button class="btn-wallet" onclick="action('connect')">
                    <i data-lucide="wallet"></i> <span>Connect Wallet</span>
                </button>
            </div>
        </aside>

        <!-- Основная область (Контент меняется динамически без перезагрузки) -->
        <main class="main-content" id="router-view">
            <!-- Сюда script.js подставит активную страницу -->
        </main>
    </div>

    <!-- Всплывающие уведомления (Toast) -->
    <div id="toast" class="toast">Система готова</div>

    <!-- Подключение логики -->
    <script src="script.js"></script>
</body>
</html>
